name: Kernel Runtime V6.0 Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Locate V6.0 code
        shell: bash
        run: |
          if [ -f "pyproject.toml" ]; then
            PROJECT_DIR="$GITHUB_WORKSPACE"
          elif [ -f "V6.0版本代码/pyproject.toml" ]; then
            PROJECT_DIR="$GITHUB_WORKSPACE/V6.0版本代码"
          else
            PROJECT_FILE="$(find "$GITHUB_WORKSPACE" -maxdepth 3 -type f -name pyproject.toml -print -quit)"
            if [ -z "$PROJECT_FILE" ]; then
              echo "ERROR: pyproject.toml not found"
              exit 1
            fi
            PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Runtime code found: $PROJECT_DIR"

      - name: Install package
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile source
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          python -m compileall -q src tests load_tests

      - name: Run all tests
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          python -m unittest discover -s tests -v

      - name: Run closed-loop demo
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          python main.py

      - name: Run zero-token load test
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          python load_tests/run_load.py --tasks 200 --concurrency 16
